<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Autonomite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body {
            background: linear-gradient(135deg, #01a4a6 0%, #f56453 100%);
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center">
    <div class="bg-white rounded-lg shadow-xl p-8 w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-gray-900">Set Your Password</h1>
            <p class="text-gray-600">Choose a password for your account</p>
        </div>

        <form id="resetForm" class="space-y-6">
            <!-- Token fields hidden by default; shown only if tokens not in URL -->
            <div id="tokenFields" class="hidden space-y-4">
                <div>
                    <label for="accessToken" class="block text-sm font-medium text-gray-700">Access Token</label>
                    <textarea
                        id="accessToken"
                        name="accessToken"
                        class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-[#01a4a6] focus:border-[#01a4a6] text-xs"
                        placeholder="Paste your access token here"
                        rows="3"
                    ></textarea>
                </div>
                <div>
                    <label for="refreshToken" class="block text-sm font-medium text-gray-700">Refresh Token</label>
                    <input
                        type="text"
                        id="refreshToken"
                        name="refreshToken"
                        class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-[#01a4a6] focus:border-[#01a4a6]"
                        placeholder="Paste your refresh token here"
                    >
                </div>
            </div>

            <div>
                <label for="newPassword" class="block text-sm font-medium text-gray-700">New Password</label>
                <input
                    type="password"
                    id="newPassword"
                    name="newPassword"
                    required
                    minlength="6"
                    class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-[#01a4a6] focus:border-[#01a4a6]"
                    placeholder="Enter new password"
                >
            </div>

            <div>
                <label for="confirmPassword" class="block text-sm font-medium text-gray-700">Confirm Password</label>
                <input
                    type="password"
                    id="confirmPassword"
                    name="confirmPassword"
                    required
                    minlength="6"
                    class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-[#01a4a6] focus:border-[#01a4a6]"
                    placeholder="Confirm new password"
                >
                <p id="passwordMatchHint" class="mt-1 text-sm hidden"></p>
            </div>

            <!-- Password requirements hint -->
            <div id="passwordRequirements" class="text-sm text-gray-500 space-y-1">
                <p id="reqLength" class="flex items-center gap-2">
                    <span class="req-icon">○</span> At least 6 characters
                </p>
                <p id="reqMatch" class="flex items-center gap-2">
                    <span class="req-icon">○</span> Passwords match
                </p>
            </div>

            <div>
                <button
                    type="submit"
                    id="resetBtn"
                    class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-[#01a4a6] hover:bg-[#018789] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-[#01a4a6] disabled:opacity-50 disabled:cursor-not-allowed"
                >
                    Update Password
                </button>
            </div>
        </form>

        <div id="errorMessage" class="mt-4 p-3 bg-red-100 border border-red-400 text-red-700 rounded hidden"></div>
        <div id="successMessage" class="mt-4 p-3 bg-green-100 border border-green-400 text-green-700 rounded hidden"></div>

        <div class="mt-6 text-center">
            <a href="/admin/login" class="text-sm text-[#01a4a6] hover:text-[#018789] underline">Back to Login</a>
        </div>
    </div>

    <script>
        const supabaseUrl = '{{ supabase_url }}';
        const supabaseKey = '{{ supabase_anon_key }}';

        // Debug: Log Supabase configuration
        console.log('[reset-password] Supabase URL:', supabaseUrl);
        console.log('[reset-password] Supabase Key present:', !!supabaseKey);

        if (!supabaseUrl || !supabaseKey || supabaseUrl === '' || supabaseKey === '') {
            console.error('[reset-password] Missing Supabase configuration!');
            document.getElementById('errorMessage').textContent = 'Configuration error. Please contact support.';
            document.getElementById('errorMessage').classList.remove('hidden');
        }

        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        let hasSession = false;

        // Real-time password validation
        function validatePasswords() {
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const reqLength = document.getElementById('reqLength');
            const reqMatch = document.getElementById('reqMatch');
            const resetBtn = document.getElementById('resetBtn');

            // Check length requirement
            const lengthOk = newPassword.length >= 6;
            reqLength.querySelector('.req-icon').textContent = lengthOk ? '✓' : '○';
            reqLength.className = lengthOk ? 'flex items-center gap-2 text-green-600' : 'flex items-center gap-2';

            // Check match requirement (only if confirm password has content)
            const matchOk = confirmPassword.length > 0 && newPassword === confirmPassword;
            const matchPending = confirmPassword.length === 0;
            reqMatch.querySelector('.req-icon').textContent = matchOk ? '✓' : '○';
            if (matchOk) {
                reqMatch.className = 'flex items-center gap-2 text-green-600';
            } else if (!matchPending && confirmPassword.length > 0 && newPassword !== confirmPassword) {
                reqMatch.className = 'flex items-center gap-2 text-red-600';
                reqMatch.querySelector('.req-icon').textContent = '✗';
            } else {
                reqMatch.className = 'flex items-center gap-2';
            }

            // Enable/disable submit button based on validation
            const isValid = lengthOk && matchOk;
            resetBtn.disabled = !isValid;

            return isValid;
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const errorMessage = document.getElementById('errorMessage');
            const newPasswordInput = document.getElementById('newPassword');
            const confirmPasswordInput = document.getElementById('confirmPassword');
            const resetBtn = document.getElementById('resetBtn');

            // Initially disable the button until validation passes
            resetBtn.disabled = true;

            // Add real-time validation listeners
            newPasswordInput.addEventListener('input', validatePasswords);
            confirmPasswordInput.addEventListener('input', validatePasswords);

            // Check for tokens in hash (from Supabase recovery redirect)
            const hash = window.location.hash.substring(1);
            const urlParams = new URLSearchParams(hash);
            const accessToken = urlParams.get('access_token');
            const refreshToken = urlParams.get('refresh_token');
            const errorParam = urlParams.get('error');
            const errorDescription = urlParams.get('error_description');

            console.log('[reset-password] URL hash params:', {
                hasAccessToken: !!accessToken,
                hasRefreshToken: !!refreshToken,
                error: errorParam
            });

            // If there's an error in the URL (expired link, etc.)
            if (errorParam) {
                errorMessage.textContent = errorDescription || 'The recovery link is invalid or has expired.';
                errorMessage.classList.remove('hidden');
                document.getElementById('tokenFields').classList.remove('hidden');
                return;
            }

            // If we have tokens in URL, set the session
            if (accessToken && refreshToken) {
                try {
                    console.log('[reset-password] Setting session from URL tokens...');
                    const { data, error } = await supabase.auth.setSession({
                        access_token: accessToken,
                        refresh_token: refreshToken
                    });
                    if (error) throw error;
                    hasSession = true;
                    console.log('[reset-password] Session established from URL tokens');
                } catch (err) {
                    console.error('[reset-password] Failed to set session from URL tokens:', err);
                    errorMessage.textContent = 'Failed to verify recovery link. It may have expired.';
                    errorMessage.classList.remove('hidden');
                    document.getElementById('tokenFields').classList.remove('hidden');
                }
            } else {
                // Check if already logged in (session exists)
                const { data: { session } } = await supabase.auth.getSession();
                if (session) {
                    hasSession = true;
                    console.log('[reset-password] Existing session found');
                } else {
                    console.log('[reset-password] No session found, showing manual token fields');
                    // No tokens in URL and no session — show manual fields
                    document.getElementById('tokenFields').classList.remove('hidden');
                    document.getElementById('accessToken').setAttribute('required', 'required');
                    document.getElementById('refreshToken').setAttribute('required', 'required');
                }
            }
        });

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            console.log('[reset-password] Form submitted');

            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const resetBtn = document.getElementById('resetBtn');
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');

            // Hide previous messages
            errorMessage.classList.add('hidden');
            successMessage.classList.add('hidden');

            // Validate passwords
            if (newPassword !== confirmPassword) {
                errorMessage.textContent = 'Passwords do not match.';
                errorMessage.classList.remove('hidden');
                console.log('[reset-password] Validation failed: passwords do not match');
                return;
            }

            if (newPassword.length < 6) {
                errorMessage.textContent = 'Password must be at least 6 characters long.';
                errorMessage.classList.remove('hidden');
                console.log('[reset-password] Validation failed: password too short');
                return;
            }

            resetBtn.disabled = true;
            resetBtn.textContent = 'Updating password...';
            console.log('[reset-password] Starting password update...');

            try {
                // If no session yet, try to establish one from manual tokens
                if (!hasSession) {
                    const accessToken = document.getElementById('accessToken').value.trim();
                    const refreshToken = document.getElementById('refreshToken').value.trim();

                    if (!accessToken || !refreshToken) {
                        throw new Error('Missing authentication tokens. Please use the link from your email.');
                    }

                    console.log('[reset-password] Setting session from manual tokens...');
                    const { data: sessionData, error: sessionError } = await supabase.auth.setSession({
                        access_token: accessToken,
                        refresh_token: refreshToken
                    });

                    if (sessionError) throw sessionError;
                    hasSession = true;
                    console.log('[reset-password] Session established from manual tokens');
                }

                // Now update the password
                console.log('[reset-password] Calling supabase.auth.updateUser...');
                const { data: updateData, error: updateError } = await supabase.auth.updateUser({
                    password: newPassword
                });

                console.log('[reset-password] updateUser response:', { data: updateData, error: updateError });

                if (updateError) throw updateError;

                // Get current session for storing token
                const { data: { session } } = await supabase.auth.getSession();
                if (session?.access_token) {
                    localStorage.setItem('admin_token', session.access_token);
                    document.cookie = `admin_token=${session.access_token}; path=/; max-age=28800`;
                    console.log('[reset-password] Stored new session token');
                }

                successMessage.textContent = 'Password updated successfully! Redirecting to login...';
                successMessage.classList.remove('hidden');
                console.log('[reset-password] Password update successful!');

                setTimeout(() => {
                    window.location.href = '/admin/login';
                }, 2000);

            } catch (error) {
                console.error('[reset-password] Password update error:', error);
                errorMessage.textContent = error.message || 'Failed to update password. The link may have expired — please request a new one.';
                errorMessage.classList.remove('hidden');
                resetBtn.disabled = false;
                resetBtn.textContent = 'Update Password';
            }
        });
    </script>
</body>
</html>

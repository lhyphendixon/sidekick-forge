version: '3.8'

services:
  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${APP_NAME:-sidekick-forge}-fastapi
    user: root
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override/add specific values that differ from .env
      - REDIS_HOST=redis
      - DOCKER_HOST=unix:///var/run/docker.sock
      - DOCUMENT_PROCESSOR_MAX_CONCURRENCY=2
      - DOCUMENT_PROCESSOR_MAX_CHUNKS=250
      - ENABLE_LIVEKIT_TEXT_DISPATCH=true
      # Ensure AGENT_NAME and LIVEKIT_AGENT_NAME are in sync
      - LIVEKIT_AGENT_NAME=${AGENT_NAME:-sidekick-agent}
    volumes:
      - ./app:/app/app
      - ./logs:/app/logs
      - ./app/static:/app/static
      - ./.env:/app/.env:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - platform-network

  redis:
    image: redis:7-alpine
    container_name: ${APP_NAME:-sidekick-forge}-redis
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - platform-network

  nginx:
    image: nginx:alpine
    container_name: ${APP_NAME:-sidekick-forge}-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./ssl:/etc/nginx/ssl:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
      - ./app/static:/app/static:ro
    depends_on:
      fastapi:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - platform-network

  agent-worker:
    build:
      context: ./docker/agent
      dockerfile: Dockerfile
    image: ${APP_NAME:-sidekick-forge}/agent-runtime:latest
    restart: always
    command: python /app/entrypoint.py
    env_file:
      - .env
    environment:
      # Override/add specific values for agent worker
      - REDIS_URL=redis://redis:6379
      - ENABLE_PROACTIVE_GREETING=true
      - VOICE_ITEM_COMMIT_FALLBACK=false
      # RAG context settings
      - CONTEXT_MAX_KNOWLEDGE_RESULTS=${CONTEXT_MAX_KNOWLEDGE_RESULTS:-10}
      - CONTEXT_MATCH_THRESHOLD=${CONTEXT_MATCH_THRESHOLD:-0.3}
      # LiveKit agent log level (v1.5.0+): debug, info, warning, error
      - LIVEKIT_LOG_LEVEL=${LIVEKIT_LOG_LEVEL:-info}
    volumes:
      - ./docker/agent/entrypoint.py:/app/entrypoint.py:ro
      - ./docker/agent/sidekick_agent.py:/app/sidekick_agent.py:ro
      - ./docker/agent/context.py:/app/context.py:ro
      - ./docker/agent/config_validator.py:/app/config_validator.py:ro
      - ./docker/agent/api_key_loader.py:/app/api_key_loader.py:ro
      - ./docker/agent/citations_service.py:/app/citations_service.py:ro
      - ./docker/agent/tool_registry.py:/app/tool_registry.py:ro
      - ./docker/agent/models:/app/models:ro
      - ./docker/agent/wizard_tasks.py:/app/wizard_tasks.py:ro
      - ./docker/agent/lore_interview_tasks.py:/app/lore_interview_tasks.py:ro
      - ./app:/app/app:ro
      - imx-cache:/tmp/imx_models
    networks:
      - platform-network

  lore-mcp:
    build:
      context: ./lore_mcp
      dockerfile: Dockerfile
    container_name: ${APP_NAME:-sidekick-forge}-lore-mcp
    ports:
      - "8082:8082"
    environment:
      - LORE_API_KEY=${LORE_API_KEY:-}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
    restart: unless-stopped
    networks:
      - platform-network

volumes:
  redis-data:
  imx-cache:

networks:
  platform-network:
    name: ${APP_NAME:-sidekick-forge}-network
    driver: bridge
